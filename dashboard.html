<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - GitHub Issues Tracker</title>

    <link rel="stylesheet" href="./tailwind.config.css">

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Tailwind & DaisyUI -->

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Google Font -->

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Font Awesome -->

</head>
<body class="bg-base-200">
    
    <header class="bg-white py-3">
        <div class="container w-[80%] mx-auto flex justify-between items-center">
            <div class="logo flex justify-start items-center gap-2 mb-2">
                <img class="w-8" src="./assets/github-logo.png" alt="logo">
                <h1 class="text-[#1F2937] text-2xl font-semibold hidden md:block">GitHub Issues Tracker</h1>
            </div>

            <div class="new-issue flex gap-1.5 ml-2 sm:ml-0">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g
                        stroke-linejoin="round"
                        stroke-linecap="round"
                        stroke-width="2.5"
                        fill="none"
                        stroke="currentColor"
                        >
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchInput" type="search" placeholder="Search issues..">
                </label>
                
                <button id="searchBtn" class="btn btn-primary ">+ New Issue</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container w-[80%] mx-auto mt-12">
            <div class="tabs-button bg-white p-6 shadow rounded-md">
                <button id="allBtn" class="btn btn-primary mr-1.5">All</button>
                <button id="openBtn" class="btn btn-outline mr-1.5">Open</button>
                <button id="closedBtn" class="btn btn-outline">Closed</button>
            </div>
        </div>

        <section>
            <div class="container w-[80%] mx-auto mt-5 shadow rounded-md">
                <div class="issues shadow bg-white p-6 rounded-md flex justify-between items-center">
                    <div class="issues-content flex items-center gap-3">
                        <div class="issues-img p-3 bg-[#ECE4FF] rounded-full">
                            <img src="./assets/Aperture.png" alt="aperture">
                        </div>

                        <div class="issues-texts">
                            <h1 id="issueCountText" class="text-[#1F2937] text-xl font-semibold">50 Issues</h1>
                            <p class="text-[#64748B] text-[16px] font-normal">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="issues-status block sm:flex gap-5">
                        <p class="text-[#1F2937] text-[16px] font-medium flex items-center gap-2"><span class="h-4 w-4 inline-block bg-[#00A96E] rounded-full"></span>Open</p>
                        
                        <p class="text-[#1F2937] text-[16px] font-medium flex items-center gap-2"><span class="h-4 w-4 inline-block bg-[#A855F7] rounded-full"></span>Closed</p>
                    </div>
                </div>

                <!-- Cards -->
                <div id="issuesContainer" class="issues-cards w-11/12 mx-auto pt-10 pb-10 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                   
                </div>
                <!-- Cards -->

                <!-- Modal -->
                <div class="modal-c">
                    <dialog id="issueModal" class="modal">
                        <div class="modal-box" id="modalContent">
                           
                        </div>
                    </dialog>
                </div>
                <!-- Modal -->
            </div>
        </section>
    </main>



    <script src="./js/dashboard.js"></script>
</body>
</html>
